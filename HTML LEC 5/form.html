<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML FORM TAG</title>
  </head>
  <body>
    <form action="carsDetails.html">
      <label for="complete-name">Name:</label>
      <input
        type="email"
        id="complete-name"
        name="complete-name"
        placeholder="Enter your name"
      />
      <label for="my-age">Age:</label>
      <input
        type="number"
        id="my-age"
        name="my-age"
        placeholder="Enter your age"
      />
      <button type="submit">Submit Form</button>
    </form>
  </body>
</html>
